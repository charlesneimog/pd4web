<!doctype html>
<html lang="en">
    <head>
        <title>Pd4Web</title>
        <meta charset="UTF-8" />
        <!-- WebApp manifest -->
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#000000" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <!-- Always BEFORE pd4web.js (it update COI) -->
        <script src="./pd4web.threads.js"></script>
        <!-- Main modules -->

        <script src="./pd4web.js"></script>
        <style>
            :root {
                --bg: #f4f6f9;
                --fg: rgba(20, 25, 31, 0.92);
                --panel: rgba(255, 255, 255, 0.75);
                --shadow: rgba(15, 23, 42, 0.12) 0px 2px 4px, rgba(15, 23, 42, 0.22) 0px 10px 24px;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: #171b20;
                    --fg: rgba(255, 255, 255, 0.9);
                    --panel: rgba(36, 40, 46, 0.7);
                    --shadow: rgba(0, 0, 0, 0.2) 0px 2px 4px, rgba(0, 0, 0, 0.45) 0px 12px 28px;
                }
            }

            body {
                margin: 0;
                touch-action: pan-x pan-y;
                color: var(--fg);
            }

            span {
                color: var(--fg);
            }

            #wasm-loader {
                position: fixed;
                top: 1rem;
                left: 50%;
                transform: translateX(-50%);
                display: grid;
                gap: 0.35rem;
                text-align: center;
                width: min(320px, calc(100vw - 2rem));
                padding: 0.65rem 0.85rem;
                border-radius: 0.65rem;
            }

            #status {
                font-size: 0.72rem;
            }

            #progress {
                width: 100%;
                height: 0.45rem;
                border-radius: 999px;
            }

            .pd4web-patch-canvas {
                margin: 10px auto;
                display: block;
                border-radius: 0.65rem;
                box-shadow: var(--shadow);
            }

            .pd4web-patch-canvas:focus {
                box-shadow:
                    rgba(100, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(100, 30, 37, 0.32) 0px 2px 16px 0px;
                outline: none;
            }

            .pd4web-sound-switch {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 25px;
                height: 25px;
                margin: 0 auto;
                transform: none;
            }

            @media (prefers-color-scheme: dark) {
                .pd4web-sound-switch {
                    filter: invert(1);
                }
            }
        </style>
    </head>
    <body>
        <div id="wasm-loader">
            <span id="status">Loading...</span>
            <progress id="progress" value="0" max="100"></progress>
        </div>

        <!-- All the styles are in the pd4web.style.css -->
        <span class="pd4web-sound-switch" id="Pd4WebAudioSwitch"></span>
        <canvas tabindex="0" class="pd4web-patch-canvas" id="Pd4WebCanvas"></canvas>
        <script>
            const getEId = (id) => document.getElementById(id);
            const ui = { status: getEId("status"), progress: getEId("progress"), loader: getEId("wasm-loader") };

            /* Download the wasm file */
            const fetchWasm = (url) =>
                new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open("GET", url);
                    xhr.responseType = "arraybuffer";
                    xhr.onprogress = ({ loaded, total, lengthComputable }) => {
                        if (!lengthComputable) return;
                        const pct = Math.floor((loaded / total) * 100);
                        ui.progress.value = pct;
                        ui.status.textContent = `Downloading WASM... ${pct}%`;
                    };
                    xhr.onload = () =>
                        xhr.status === 200
                            ? resolve(xhr.response)
                            : reject(new Error(`Failed to load ${url}, status ${xhr.status}`));
                    xhr.onerror = () => reject(new Error(`Network error loading ${url}`));
                    xhr.send();
                });

            /* Init Pd4Web */
            (async () => {
                try {
                    const wasmBinary = await fetchWasm("./pd4web.wasm");
                    const { Pd4Web } = await Pd4WebModule({ wasmBinary });
                    new Pd4Web().openPatch("index.pd", {
                        canvasId: "Pd4WebCanvas",
                        soundToggleId: "Pd4WebAudioSwitch",
                        renderGui: false,
                    });
                    ui.loader.style.display = "none";
                } catch (error) {
                    ui.status.textContent = "Failed to load WASM.";
                    console.error(error);
                }
            })();
        </script>
        <script>
            // Create an App (installable using PWA ( https://en.wikipedia.org/wiki/Progressive_web_app ))
            // if ("serviceWorker" in navigator) {
            //     navigator.serviceWorker
            //         .register("pd4web.sw.js")
            //         .then(() => console.log("Service Worker registered"))
            //         .catch((err) => console.error("Service Worker registration failed:", err));
            // }
        </script>
    </body>
</html>
