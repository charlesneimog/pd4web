<!doctype html>
<html class="light" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Digital Curator | Sensor Observatory</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <script src="./pd4web.threads.js"></script>
        <script src="./pd4web.js"></script>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            background: "#ffffff",
                            surface: "#f9f9ff",
                            "surface-container": "#f3f4f6",
                            primary: "#111827",
                            "on-surface": "#111827",
                            "on-surface-variant": "#4b5563",
                            outline: "#e5e7eb",
                            "outline-variant": "#f3f4f6",
                        },
                        fontFamily: {
                            headline: ["Inter"],
                            body: ["Inter"],
                            label: ["Inter"],
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 300,
                    "GRAD" 0,
                    "opsz" 24;
            }
            body::-webkit-scrollbar {
                display: none;
            }
            body {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: rgb(255, 255, 255);
                    --fg: rgb(0, 0, 0, 0.9);
                }
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: rgb(48, 48, 48);
                    --fg: rgb(255, 255, 255, 0.9);

                    /* .pd4web-sound-switch { */
                    /*     filter: invert(1); */
                    /* } */
                }
            }

            body {
                font-size: 10px;
                touch-action: pan-x pan-y;
                background-color: var(--bg);
            }

            span {
                color: @fg;
            }

            #wasm-loader {
                position: fixed; /* fica fixo na tela */
                top: 10px; /* 50% da altura */
                left: 50%; /* 50% da largura */
                transform: translate(-50%, -50%); /* centraliza exatamente */
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 200px;
                padding: 8px;
                border-radius: 5px;
                background-color: rgba(0, 0, 0, 0.05);
                box-shadow:
                    rgba(14, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
            }

            /* Status texto menor e centralizado */
            #status {
                font-size: 10px;
                text-align: center;
                margin-bottom: 4px;
                color: var(--fg);
            }

            /* Progress bar menor */
            #progress {
                width: 150px;
                height: 8px;
                border-radius: 4px;
            }

            .pd4web-patch-canvas {
                tabindex: 0;
                margin: 10px auto;
                display: flex;
                border-radius: 5px;
                box-shadow:
                    rgba(14, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
            }

            .pd4web-patch-canvas:focus {
                box-shadow:
                    rgba(100, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(100, 30, 37, 0.32) 0px 2px 16px 0px;
                outline: none;
            }

            .pd4web-sound-switch {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 25px;
                height: 25px;
                margin: 0 auto;
                transform: none;
            }

            /* Animation */
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            @keyframes pulse {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.2);
                }
                100% {
                    transform: scale(1);
                }
            }
            .pulse-icon {
                animation: pulse 1s infinite;
            }
        </style>
    </head>
    <body class="bg-background text-on-surface font-body selection:bg-primary selection:text-white">
        <header
            class="fixed top-0 w-full z-50 bg-[#f9f9ff]/80 backdrop-blur-xl shadow-[0_40px_60px_-15px_rgba(20,27,43,0.04)]"
        >
            <div class="flex items-center justify-between px-8 py-4 w-full max-w-7xl mx-auto">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-xl text-[#000000]">sensors</span>
                    <h1 class="text-xl font-black text-[#000000] tracking-tighter uppercase font-['Inter']">
                        Digital Curator
                    </h1>
                </div>
                <div class="flex items-center">
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-[#141b2b]/40">v1.0.42</span>
                </div>
            </div>
        </header>

        <div id="wasm-loader" style="text-align: center; margin: 10px">
            <span id="status">Loading...</span>
            <progress id="progress" value="0" max="100" style="width: 300px"></progress>
        </div>
        <main class="pt-32 pb-40 px-8 max-w-md mx-auto space-y-16">
            <div>
                <span id="sensor-message" class="font-label text-primary/40 tracking-widest uppercase"
                    >No Sensor selected</span
                >
            </div>
        <span class="pd4web-sound-switch" id="Pd4WebAudioSwitch"></span>
            <section aria-labelledby="sensors-heading">
                <header class="mb-8 flex justify-between items-baseline border-b border-primary/10 pb-2">
                    <h2
                        class="font-headline text-[10px] font-black uppercase tracking-[0.3em] text-primary"
                        id="sensors-heading"
                    >
                        Active Sensors
                    </h2>
                    <span class="font-label text-[9px] text-primary/40 tracking-widest uppercase"
                        >Status: Connected</span
                    >
                </header>
                <div class="divide-y divide-outline-variant">
                    <div class="group flex items-center justify-between py-4 transition-all duration-300">
                        <div class="flex items-center gap-4">
                            <span
                                class="material-symbols-outlined text-primary/30 group-hover:text-primary transition-colors text-lg"
                                >location_on</span
                            >
                            <span class="font-headline text-xs font-medium tracking-tight text-on-surface uppercase"
                                >GPS / Navigation</span
                            >
                        </div>
                        <button
                            id="btn-gps"
                            onclick="toggleSensor('gps')"
                            class="w-8 h-4 bg-outline-variant rounded-sm relative flex items-center px-0.5 transition-colors duration-300"
                        >
                            <div
                                id="dot-gps"
                                class="w-3 h-3 bg-on-surface-variant/40 rounded-sm translate-x-0 transition-transform duration-300"
                            ></div>
                        </button>
                    </div>

                    <div class="group flex items-center justify-between py-4">
                        <div class="flex items-center gap-4">
                            <span
                                class="material-symbols-outlined text-primary/30 group-hover:text-primary transition-colors text-lg"
                                >vibration</span
                            >
                            <span class="font-headline text-xs font-medium tracking-tight text-on-surface uppercase"
                                >Accelerometer</span
                            >
                        </div>
                        <button
                            id="btn-accel"
                            onclick="toggleSensor('accel')"
                            class="w-8 h-4 bg-outline-variant rounded-sm relative flex items-center px-0.5 transition-colors duration-300"
                        >
                            <div
                                id="dot-accel"
                                class="w-3 h-3 bg-on-surface-variant/40 rounded-sm translate-x-0 transition-transform duration-300"
                            ></div>
                        </button>
                    </div>

                    <div class="group flex items-center justify-between py-4">
                        <div class="flex items-center gap-4">
                            <span
                                class="material-symbols-outlined text-primary/30 group-hover:text-primary transition-colors text-lg"
                                >screen_rotation</span
                            >
                            <span class="font-headline text-xs font-medium tracking-tight text-on-surface uppercase"
                                >Gyroscope</span
                            >
                        </div>
                        <button
                            id="btn-gyro"
                            onclick="toggleSensor('gyro')"
                            class="w-8 h-4 bg-outline-variant rounded-sm relative flex items-center px-0.5 transition-colors duration-300"
                        >
                            <div
                                id="dot-gyro"
                                class="w-3 h-3 bg-on-surface-variant/40 rounded-sm translate-x-0 transition-transform duration-300"
                            ></div>
                        </button>
                    </div>

                    <div class="group flex items-center justify-between py-4">
                        <div class="flex items-center gap-4">
                            <span
                                class="material-symbols-outlined text-primary/30 group-hover:text-primary transition-colors text-lg"
                                >explore</span
                            >
                            <span class="font-headline text-xs font-medium tracking-tight text-on-surface uppercase"
                                >Magnetometer</span
                            >
                        </div>
                        <button
                            id="btn-mag"
                            onclick="toggleSensor('mag')"
                            class="w-8 h-4 bg-outline-variant rounded-sm relative flex items-center px-0.5 transition-colors duration-300"
                        >
                            <div
                                id="dot-mag"
                                class="w-3 h-3 bg-on-surface-variant/40 rounded-sm translate-x-0 transition-transform duration-300"
                            ></div>
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <script>
            const statusElement = document.getElementById("status");
            const progressElement = document.getElementById("progress");
            const sensorMessage = document.getElementById("sensor-message");

            function fetchWithProgress(url) {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open("GET", url, true);
                    xhr.responseType = "arraybuffer";
                    xhr.onprogress = (event) => {
                        if (event.lengthComputable) {
                            const percent = Math.floor((event.loaded / event.total) * 100);
                            progressElement.value = percent;
                            statusElement.textContent = `Downloading WASM... ${percent}%`;
                        }
                    };

                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            resolve(xhr.response);
                        } else {
                            reject(new Error(`Failed to load ${url}, status ${xhr.status}`));
                        }
                    };

                    xhr.onerror = () => reject(new Error(`Network error loading ${url}`));
                    xhr.send();
                });
            }

            var Pd4Web = null;

            fetchWithProgress("./pd4web.wasm")
                .then((wasmBuffer) => {
                    Pd4WebModule({ wasmBinary: wasmBuffer }).then((Pd4WebModulePromise) => {
                        Pd4Web = new Pd4WebModulePromise.Pd4Web();
                        Pd4Web.openPatch("index.pd", {
                            soundToggleId: "Pd4WebAudioSwitch",
                            renderGui: false,
                        });
                        const wasmLoader = document.getElementById("wasm-loader");
                        statusElement.style.display = "none";
                        progressElement.style.display = "none";
                        wasmLoader.style.display = "none";
                    });
                })
                .catch((err) => {
                    statusElement.textContent = "Failed to load WASM.";
                    console.error(err);
                });
        </script>

        <script>
            const state = { active: null, refs: {}, audioCtx: null, osc: null };

            // ───────────────────────────────────────
            function generateFrequency(value, minThreshold, maxThreshold) {
                const clamp = Math.max(minThreshold, Math.min(maxThreshold, value));
                const percent = ((clamp - minThreshold) / (maxThreshold - minThreshold)) * 100;
                const freq = 200 + (percent / 100) * 800;

                console.log(`Sensor Frequency: ${freq.toFixed(0)}Hz (Raw: ${value.toFixed(2)})`);
            }

            // ──────────────────────────────────────
            function stopAudio() {
                sensorMessage.innerText = `No sensor selector`;
            }

            // Send data
            function sendData(list) {
                if (Pd4Web === null) {
                    return;
                }

                if (list.length == 2) {
                    Pd4Web.sendFloat("freq-z-toggle", 0);
                    Pd4Web.sendFloat("freq-x", list[0]);
                    Pd4Web.sendFloat("freq-y", list[1]);
                } else {
                    Pd4Web.sendFloat("freq-z-toggle", 1);
                    Pd4Web.sendFloat("freq-x", list[0]);
                    Pd4Web.sendFloat("freq-y", list[1]);
                    Pd4Web.sendFloat("freq-z", list[2]);
                }
            }

            // ──────────────────────────────────────
            const sensors = {
                gps: {
                    start: () => {
                        if (!("geolocation" in navigator)) return alert("GPS not available.");
                        state.refs.gps = navigator.geolocation.watchPosition(
                            (pos) => {
                                const lat = Math.round(((pos.coords.latitude + 90) * (1000 - 100)) / (90 - -90) + 100);
                                const lon = Math.round(
                                    ((pos.coords.longitude + 180) * (1000 - 100)) / (180 - -180) + 100,
                                );
                                sendData([lat, lon]);

                                sensorMessage.innerText = `Lat ${lat} Lon ${lon}`;
                            },
                            (err) => alert("GPS Error:", err),
                            { enableHighAccuracy: true },
                        );
                    },
                    stop: () => navigator.geolocation.clearWatch(state.refs.gps),
                },
                accel: {
                    start: () => {
                        if (!("Accelerometer" in window)) return alert("Accelerometer API not supported.");
                        try {
                            const sensor = new Accelerometer({ frequency: 60 });
                            sensor.addEventListener("reading", () => {
                                const x = Math.round(((sensor.x + 10) * (1000 - 100)) / (10 - -10) + 100);
                                const y = Math.round(((sensor.y + 10) * (1000 - 100)) / (10 - -10) + 100);
                                const z = Math.round(((sensor.z + 10) * (1000 - 100)) / (10 - -10) + 100);

                                sendData([x, y, z]);

                                sensorMessage.innerText = `Accelerometer x: ${x} y: ${y} z: ${z}`;
                            });
                            sensor.start();
                            state.refs.accel = sensor;
                        } catch (e) {
                            console.warn("Accel start failed:", e);
                        }
                    },
                    stop: () => state.refs.accel?.stop(),
                },
                gyro: {
                    start: () => {
                        if (!("Gyroscope" in window)) return alert("Gyroscope API not supported.");
                        try {
                            const sensor = new Gyroscope({ frequency: 60 });
                            sensor.addEventListener("reading", () => {
                                const x = Math.round(((sensor.x + 10) * (1000 - 100)) / (10 - -10) + 100);
                                const y = Math.round(((sensor.y + 10) * (1000 - 100)) / (10 - -10) + 100);
                                const z = Math.round(((sensor.z + 10) * (1000 - 100)) / (10 - -10) + 100);
                                sendData([x, y, z]);

                                sensorMessage.innerText = `Gyroscope x: ${x} y: ${y} z: ${z}`;
                            });
                            sensor.start();
                            state.refs.gyro = sensor;
                        } catch (e) {
                            console.warn("Gyro start failed:", e);
                        }
                    },
                    stop: () => state.refs.gyro?.stop(),
                },
                mag: {
                    start: () => {
                        if (!("Magnetometer" in window)) return alert("Magnetometer API not supported.");
                        try {
                            const sensor = new Magnetometer({ frequency: 60 });
                            sensor.addEventListener("reading", () => {
                                const x = Math.round(((sensor.x + 50) * (1000 - 100)) / (50 - -50) + 100);
                                const y = Math.round(((sensor.y + 50) * (1000 - 100)) / (50 - -50) + 100);
                                const z = Math.round(((sensor.z + 50) * (1000 - 100)) / (50 - -50) + 100);
                                sendData([x, y, z]);
                                sensorMessage.innerText = `Magnetometer x: ${x} y: ${y} z: ${z}`;
                            });
                            sensor.start();
                            state.refs.mag = sensor;
                        } catch (e) {
                            console.warn("Mag start failed:", e);
                        }
                    },
                    stop: () => state.refs.mag?.stop(),
                },
            };

            function toggleSensor(id) {
                if (state.active) {
                    sensors[state.active].stop();
                    const btn = document.getElementById(`btn-${state.active}`);
                    const dot = document.getElementById(`dot-${state.active}`);
                    btn.classList.replace("bg-primary", "bg-outline-variant");
                    dot.classList.replace("translate-x-4", "translate-x-0");
                    dot.classList.replace("bg-white", "bg-on-surface-variant/40");
                }

                if (state.active === id) {
                    state.active = null;
                    stopAudio();
                    return;
                }

                state.active = id;
                const newBtn = document.getElementById(`btn-${id}`);
                const newDot = document.getElementById(`dot-${id}`);

                newBtn.classList.replace("bg-outline-variant", "bg-primary");
                newDot.classList.replace("translate-x-0", "translate-x-4");
                newDot.classList.replace("bg-on-surface-variant/40", "bg-white");

                sensors[id].start();
            }
        </script>
    </body>
</html>
